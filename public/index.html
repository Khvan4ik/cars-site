<html lang="ru">

    }

      height: 210px;
      object-fit: cover;

    }
    .card-body {
      padding: 18px;
    }
    .card h3 {

      font-size: 24px;
      color: #111827;
    }
    .meta {

      font-size: 14px;
      margin-bottom: 12px;
    }
    .price {

      font-weight: 800;
      color: #2f6bff;
      margin-bottom: 14px;
    }
    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .small-btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    .small-btn.primary {
      background: #111827;
      color: white;
    }
    .small-btn.link {
      background: #eef3ff;
      color: #2f6bff;
    }
    .lead-box {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 24px;
      align-items: start;
      margin-top: 30px;
    }

      background: white;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 14px 40px rgba(17,24,39,.08);
      border: 1px solid #edf1f7;
    }

      padding: 15px 16px;

      border: 1px solid #dbe3ef;
      margin-top: 12px;
      font-size: 16px;
