<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Авто из Кореи от Вити ишака</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111;
    }
    header {
      background: #111827;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    header h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }
    header p {
      margin: 0;
      font-size: 16px;
      color: #d1d5db;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .cars {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .card h3 {
      margin-top: 0;
    }
    .price {
      font-size: 22px;
      font-weight: bold;
      color: #2563eb;
      margin: 10px 0;
    }
    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      background: #2563eb;
      color: white;
      margin-top: 10px;
    }
    .lead-form {
      margin-top: 40px;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .lead-form input, .lead-form button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      box-sizing: border-box;
      font-size: 16px;
    }
    .lead-form button {
      background: #111827;
      color: white;
      border: none;
    }
    #status {
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>Авто из Кореи в Казахстан от ВИТИ ИШАКА</h1>
    <p>Подбор, проверка, доставка и оформление авто под ключ</p>
  </header>

  <div class="container">
    <h2>Популярные автомобили</h2>
    <div class="cars" id="cars"></div>

    <div class="lead-form">
      <h2>Оставить заявку</h2>
      <input type="text" id="name" placeholder="Ваше имя" />
      <input type="text" id="phone" placeholder="Ваш телефон" />
      <input type="text" id="car" placeholder="Какой автомобиль интересует" />
      <button onclick="sendLead()">Отправить заявку</button>
      <div id="status"></div>
    </div>
  </div>

  <script>
    async function loadCars() {
      const res = await fetch('/cars');
      const cars = await res.json();
      const container = document.getElementById('cars');

      container.innerHTML = cars.map(car => `
        <div class="card">
          <h3>${car.title}</h3>
          <div class="price">${car.price}</div>
          <a class="btn" href="${car.link}" target="_blank">Смотреть авто</a>
        </div>
      `).join('');
    }

    async function sendLead() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const car = document.getElementById('car').value;

      const res = await fetch('/lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, car })
      });

      const data = await res.json();
      document.getElementById('status').innerText =
        data.status === 'ok' ? 'Заявка отправлена!' : 'Ошибка отправки';
    }

    loadCars();
  </script>
</body>
</html>
